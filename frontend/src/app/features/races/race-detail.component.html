<section class="rc-page rc-page-narrow rc-stagger">
  @if (!race) {
    <div class="rc-empty">{{ 'race.loading' | translate }}</div>
  } @else {
    <header class="rc-page-header">
      <div>
        <span class="rc-eyebrow">{{ 'race.detailTitle' | translate }}</span>
        <h1 class="rc-display rc-page-title mt-4">{{ race.track }}</h1>
      </div>
      <span class="rc-badge">{{ 'race.status.' + race.status | translate }}</span>
    </header>

    <div class="rc-panel p-7 md:p-10">
      <form class="space-y-4" [formGroup]="form" (ngSubmit)="update()">
        <label class="rc-field"><span class="rc-field-label">{{ 'race.track' | translate }}</span><input class="rc-input" type="text" formControlName="track"/></label>
        <div class="grid gap-4 md:grid-cols-2">
          <label class="rc-field"><span class="rc-field-label">{{ 'race.date' | translate }}</span><input class="rc-input" type="date" formControlName="raceDate"/></label>
          <label class="rc-field"><span class="rc-field-label">{{ 'race.time' | translate }}</span><input class="rc-input" type="time" formControlName="raceTime"/></label>
        </div>
        <label class="rc-field"><span class="rc-field-label">{{ 'race.format' | translate }}</span><input class="rc-input" type="text" formControlName="format"/></label>
        <div class="grid gap-4 md:grid-cols-2">
          <label class="rc-field"><span class="rc-field-label">{{ 'race.laps' | translate }}</span><input class="rc-input" type="number" formControlName="laps"/></label>
          <label class="rc-field"><span class="rc-field-label">{{ 'race.durationMinutes' | translate }}</span><input class="rc-input" type="number" formControlName="durationMinutes"/></label>
        </div>
        <div class="grid gap-4 md:grid-cols-2">
          <label class="rc-field"><span class="rc-field-label">{{ 'race.weather' | translate }}</span><input class="rc-input" type="text" formControlName="weather"/></label>
          <label class="rc-field"><span class="rc-field-label">{{ 'race.carCategory' | translate }}</span><input class="rc-input" type="text" formControlName="carCategory"/></label>
        </div>

        <div class="flex flex-wrap items-center gap-2 pt-2 border-t border-[var(--rc-line-faint)]">
          <button class="rc-btn-primary" type="submit">{{ 'race.updateAction' | translate }}</button>
          @for (status of statuses; track status) {
            <button class="rc-btn-ghost" type="button" (click)="setStatus(status)">{{ 'race.status.' + status | translate }}</button>
          }
          <a class="rc-link-quiet text-sm ml-auto" [routerLink]="['/seasons', race.seasonId, 'calendar']">&larr; {{ 'race.backToCalendar' | translate }}</a>
        </div>
      </form>
    </div>
  }
</section>
