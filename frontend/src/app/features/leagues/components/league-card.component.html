<article class="rc-panel rounded-2xl p-5">
  <div class="flex items-start justify-between gap-3">
    <h3 class="text-lg font-semibold text-[var(--rc-text)]">{{ league.name }}</h3>
    <span class="rounded-full border border-[var(--rc-border)] bg-[color:var(--rc-surface-2)] px-2 py-1 text-xs text-[var(--rc-text-muted)]">
      {{ 'league.visibility.' + league.visibility | translate }}
    </span>
  </div>

  <p class="mt-3 line-clamp-3 text-sm text-[var(--rc-text-muted)]">{{ league.description }}</p>

  <div class="mt-4 flex items-center justify-between text-xs text-[var(--rc-text-muted)]">
    <span>{{ 'league.platform' | translate }}: {{ league.gamePlatform }}</span>
    <span>{{ 'league.myRole' | translate }}: {{ league.myRole ?? ('league.notMember' | translate) }}</span>
  </div>

  <a class="mt-4 inline-flex text-sm font-medium text-cyan-600 hover:text-cyan-500 dark:text-cyan-300 dark:hover:text-cyan-200"
     [routerLink]="['/leagues', league.id]">
    {{ 'league.viewDetails' | translate }}
  </a>
</article>
