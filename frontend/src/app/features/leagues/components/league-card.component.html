<article class="rc-league-card rc-card-accent" [class.is-private]="league.visibility === 'PRIVATE'">
  <header class="rc-league-card-head">
    <span class="rc-mono rc-league-card-id">#{{ ('00' + league.id).slice(-3) }}</span>
    <span class="rc-badge" [class.rc-badge-accent]="league.visibility === 'PRIVATE'" [class.rc-badge-go]="league.visibility === 'PUBLIC'">
      <span class="rc-dot"></span>
      {{ 'league.visibility.' + league.visibility | translate }}
    </span>
  </header>

  <h3 class="rc-display rc-league-card-title">{{ league.name }}</h3>

  <p class="rc-league-card-description">{{ league.description }}</p>

  <dl class="rc-league-card-meta">
    <div>
      <dt class="rc-eyebrow-bare">PLATFORM</dt>
      <dd class="rc-mono rc-league-card-meta-value">{{ league.gamePlatform }}</dd>
    </div>
    <div>
      <dt class="rc-eyebrow-bare">ROLE</dt>
      <dd class="rc-mono rc-league-card-meta-value">{{ league.myRole ?? ('league.notMember' | translate) }}</dd>
    </div>
  </dl>

  <a class="rc-link rc-league-card-link" [routerLink]="['/leagues', league.id]">
    {{ 'league.viewDetails' | translate }} →
  </a>
</article>
