<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
  <label class="block text-sm text-[var(--rc-text-muted)]">
    <span>{{ 'league.name' | translate }}</span>
    <input class="rc-input mt-2" formControlName="name" type="text"/>
  </label>

  <label class="block text-sm text-[var(--rc-text-muted)]">
    <span>{{ 'league.description' | translate }}</span>
    <textarea class="rc-input mt-2 min-h-28" formControlName="description"></textarea>
  </label>

  <div class="grid gap-4 md:grid-cols-2">
    <label class="block text-sm text-[var(--rc-text-muted)]">
      <span>{{ 'league.platform' | translate }}</span>
      <select class="rc-input mt-2" formControlName="gamePlatform">
        @for (platform of platforms; track platform) {
          <option [value]="platform">{{ platform }}</option>
        }
      </select>
    </label>

    <label class="block text-sm text-[var(--rc-text-muted)]">
      <span>{{ 'league.visibilityLabel' | translate }}</span>
      <select class="rc-input mt-2" formControlName="visibility">
        @for (visibility of visibilities; track visibility) {
          <option [value]="visibility">{{ 'league.visibility.' + visibility | translate }}</option>
        }
      </select>
    </label>
  </div>

  <button [disabled]="form.invalid" class="rc-btn-primary" type="submit">{{ submitLabel | translate }}</button>
</form>
