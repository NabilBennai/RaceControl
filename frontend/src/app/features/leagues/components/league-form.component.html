<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
  <label class="rc-field">
    <span class="rc-field-label">
      <span>{{ 'league.name' | translate }}</span>
      <span class="rc-field-label-index">01</span>
    </span>
    <input class="rc-input" formControlName="name" type="text" placeholder="Iberian GT Championship"/>
  </label>

  <label class="rc-field">
    <span class="rc-field-label">
      <span>{{ 'league.description' | translate }}</span>
      <span class="rc-field-label-index">02</span>
    </span>
    <textarea class="rc-input min-h-32" formControlName="description" placeholder="Long-form season with sprint + feature races, mandatory pit stops, daily qualifying."></textarea>
  </label>

  <div class="grid gap-5 md:grid-cols-2">
    <label class="rc-field">
      <span class="rc-field-label">
        <span>{{ 'league.platform' | translate }}</span>
        <span class="rc-field-label-index">03</span>
      </span>
      <select class="rc-input" formControlName="gamePlatform">
        @for (platform of platforms; track platform) {
          <option [value]="platform">{{ platform }}</option>
        }
      </select>
    </label>

    <label class="rc-field">
      <span class="rc-field-label">
        <span>{{ 'league.visibilityLabel' | translate }}</span>
        <span class="rc-field-label-index">04</span>
      </span>
      <select class="rc-input" formControlName="visibility">
        @for (visibility of visibilities; track visibility) {
          <option [value]="visibility">{{ 'league.visibility.' + visibility | translate }}</option>
        }
      </select>
    </label>
  </div>

  <div class="pt-3 border-t border-[var(--rc-line-faint)]">
    <button [disabled]="form.invalid" class="rc-btn-primary" type="submit">
      {{ submitLabel | translate }} →
    </button>
  </div>
</form>
