<section class="rc-page rc-page-narrow rc-stagger">
  @if (!season) {
    <div class="rc-empty">
      <p class="rc-eyebrow-bare">{{ 'paddock.loadingPitWall' | translate }}</p>
      <p class="mt-3 text-[var(--rc-ink-soft)]">{{ 'season.loading' | translate }}</p>
    </div>
  } @else {
    <header class="rc-page-header">
      <div>
        <span class="rc-eyebrow">{{ 'paddock.season' | translate }} #{{ ('00' + season.id).slice(-3) }}</span>
        <h1 class="rc-display rc-page-title mt-4">{{ season.name }}</h1>
      </div>
      <span class="rc-badge">{{ 'season.status.' + season.status | translate }}</span>
    </header>

    <div class="rc-panel p-7 md:p-10">
      <form class="space-y-5" [formGroup]="form" (ngSubmit)="update()">
        <label class="rc-field"><span class="rc-field-label"><span>{{ 'season.name' | translate }}</span><span class="rc-field-label-index">01</span></span><input class="rc-input" type="text" formControlName="name"/></label>
        <div class="grid gap-5 md:grid-cols-2">
          <label class="rc-field"><span class="rc-field-label"><span>{{ 'season.startDate' | translate }}</span><span class="rc-field-label-index">02</span></span><input class="rc-input rc-mono" type="date" formControlName="startDate"/></label>
          <label class="rc-field"><span class="rc-field-label"><span>{{ 'season.endDate' | translate }}</span><span class="rc-field-label-index">03</span></span><input class="rc-input rc-mono" type="date" formControlName="endDate"/></label>
        </div>

        <div class="flex flex-wrap items-center gap-2 pt-2 border-t border-[var(--rc-line-faint)]">
          <button class="rc-btn-primary" type="submit">{{ 'season.updateAction' | translate }}</button>
          <button class="rc-btn-ghost" type="button" (click)="activate()">{{ 'season.activateAction' | translate }}</button>
          <button class="rc-btn-ghost" type="button" (click)="finish()">{{ 'season.finishAction' | translate }}</button>
          <a class="rc-link-quiet text-sm ml-auto" [routerLink]="['/leagues', season.leagueId, 'seasons']">&larr; {{ 'season.backToList' | translate }}</a>
        </div>
      </form>
    </div>
  }
</section>
