<div class="pointer-events-none fixed bottom-4 right-4 z-[70] flex w-full max-w-sm flex-col gap-2 px-3 sm:bottom-6 sm:right-6 sm:px-0">
  @for (toast of toastService.toasts; track toast.id) {
    <div class="rc-toast pointer-events-auto rc-panel overflow-hidden rounded-xl p-3">
      <div class="flex items-start gap-3">
        <span class="mt-0.5"
              [class.text-emerald-400]="toast.type === 'success'"
              [class.text-red-400]="toast.type === 'error'"
              [class.text-cyan-400]="toast.type === 'info'">
          <fa-icon [icon]="toast.type === 'success' ? icons.success : toast.type === 'error' ? icons.error : icons.info"></fa-icon>
        </span>

        <div class="min-w-0 flex-1">
          <p class="text-sm font-semibold text-[var(--rc-text)]">{{ toast.title }}</p>
          @if (toast.message) {
            <p class="mt-1 text-sm text-[var(--rc-text-muted)]">{{ toast.message }}</p>
          }
        </div>

        <button (click)="toastService.dismiss(toast.id)" class="rc-btn-ghost !p-1.5" type="button" aria-label="Fermer">
          <fa-icon [icon]="icons.close"></fa-icon>
        </button>
      </div>

      <div class="mt-3 h-1 w-full rounded bg-[color:var(--rc-surface-2)]">
        <div class="rc-toast-progress h-full rounded bg-cyan-400"
             [style.animation-duration.ms]="toast.durationMs"></div>
      </div>
    </div>
  }
</div>
