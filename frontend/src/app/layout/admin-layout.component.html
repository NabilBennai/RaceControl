<section class="rc-page rc-stagger">
  <div>
    <span class="rc-eyebrow"><fa-icon [icon]="adminIcon"></fa-icon>{{ 'paddock.adminEyebrow' | translate }}</span>
    <h1 class="rc-display mt-5 text-[clamp(2.4rem,5vw,4.4rem)]">{{ 'common.adminTitle' | translate }}</h1>
    <p class="mt-5 max-w-2xl text-base leading-relaxed text-[var(--rc-muted)]">{{ 'common.adminDescription' | translate }}</p>

    <hr class="rc-divider my-10"/>

    <div class="rc-empty">
      <p class="rc-eyebrow-bare">{{ 'paddock.paddockClosed' | translate }}</p>
      <p class="mt-3 text-[var(--rc-ink-soft)]">{{ 'common.adminDescription' | translate }}</p>
    </div>
  </div>
</section>
